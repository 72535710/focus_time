<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#8B5CF6">    
<title>Focus time</title>

<style>
<script>
if ("serviceWorker" in navigator) {
    navigator.serviceWorker
        .register("./sw.js")
        .then(() => console.log("Service Worker registrado"));
}
</script>    
body{
    background:#111633 !important;
    color:white !important;
    min-height:100vh;
    margin:0;
    padding:30px;
    font-family:Arial,sans-serif;
    text-align:center;
}

h1{
    color:#8B5CF6;
}

.subtitle{
    color:#cccccc;
    margin-bottom:30px;
}

.timer-circle{
    width:280px;
    height:280px;
    border:12px solid #8B5CF6;
    border-radius:50%;
    margin:20px auto;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:56px;
    font-weight:bold;
}

.controls{
    margin-top:20px;
}

button{
    background:#8B5CF6;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:10px;
    margin:5px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

select{
    padding:10px;
    border-radius:8px;
    margin-bottom:20px;
    font-size:16px;
}

.message{
    margin-top:20px;
    font-size:18px;
    color:#A78BFA;
}
.stats{
    margin-top:30px;
    background:#1a2047;
    padding:20px;
    border-radius:15px;
}

.stats h3{
    color:#8B5CF6;
}    
 .history{
    margin-top:30px;
    background:#1a2047;
    padding:20px;
    border-radius:15px;
}

.history h3{
    color:#8B5CF6;
}

.history-item{
    margin:10px 0;
    padding:10px;
    background:#111633;
    border-radius:8px;
}   
</style>
</head>

<body>

<h1>FOCUS TIME</h1>
<p class="subtitle">Convierte el tiempo en progreso</p>

<select id="durationSelect">
    <option value="15">15 minutos</option>
    <option value="25" selected>25 minutos</option>
    <option value="35">35 minutos</option>
    <option value="45">45 minutos</option>
</select>

<div class="timer-circle" id="timer">
25:00
</div>

<div class="controls">
    <button onclick="startTimer()">▶ Iniciar</button>
    <button onclick="pauseTimer()">⏸ Pausar</button>
    <button onclick="resetTimer()">↺ Reiniciar</button>
</div>

<div class="message" id="message"></div>
<div class="stats">

    <h3>📊 Estadísticas</h3>
<div class="history">

    <h3>📜 Historial</h3>
    <div id="historyList">
         No hay sesiones registradas
    </div>
    <h3>📅 Actividad por fecha</h3>

    <div id="calendarSummary"></div>
 
</div>
    <p>
        🍅 Pomodoros completados:
        <span id="pomodorosCount">0</span>
    </p>

    <p>
        ⏱ Tiempo total estudiado:
        <span id="minutesCount">0</span> min
    </p>

</div>
<audio id="alarm">
    <source src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg" type="audio/ogg">
</audio>

<script>

let timer;
let totalSeconds = 25 * 60;
let remainingSeconds = totalSeconds;
let interval = null;

const timerDisplay = document.getElementById("timer");
const durationSelect = document.getElementById("durationSelect");
const message = document.getElementById("message");
let pomodoros =
parseInt(localStorage.getItem("pomodoros")) || 0;

 let history =
JSON.parse(
    localStorage.getItem("history")
) || [];

let totalMinutes = 0;

history.forEach(item => {
    totalMinutes += item.duration;
}); 

document.getElementById("pomodorosCount")
.textContent = pomodoros;

document.getElementById("minutesCount")
.textContent = totalMinutes;
renderHistory();
renderCalendar();
    
function updateDisplay() {
    const minutes = Math.floor(remainingSeconds / 60);
    const seconds = remainingSeconds % 60;

    timerDisplay.textContent =
        String(minutes).padStart(2,'0') +
        ":" +
        String(seconds).padStart(2,'0');
}

durationSelect.addEventListener("change", () => {
    totalSeconds = parseInt(durationSelect.value) * 60;
    remainingSeconds = totalSeconds;
    updateDisplay();
});
function renderHistory(){

    const container =
    document.getElementById("historyList");

    if(history.length === 0){

        container.innerHTML =
        "No hay sesiones registradas";

        return;
    }

    container.innerHTML = "";

    history
    .slice()
    .reverse()
    .forEach(item => {

        container.innerHTML +=
        `<div class="history-item">

            ${item.date} - ${item.duration} min

        </div>`;

    });

}
function renderCalendar(){

    const container =
    document.getElementById("calendarSummary");

    let resumen = {};

    history.forEach(item => {

        if(!resumen[item.date]){
            resumen[item.date] = 0;
        }

        resumen[item.date] += item.duration;

    });

    if(history.length === 0){

        container.innerHTML =
        "No hay actividad registrada";

        return;
    }

    container.innerHTML = "";

    for(let fecha in resumen){

        container.innerHTML +=
        `<div class="history-item">

            📅 ${fecha} - ${resumen[fecha]} min

        </div>`;
    }
}    
function startTimer() {

    if(interval) return;

    interval = setInterval(() => {

        if(remainingSeconds > 0) {
            remainingSeconds--;
            updateDisplay();
        } 
        else {

            pomodoros++;

history.push({
    date: new Date().toLocaleDateString(),
    duration: parseInt(durationSelect.value)
});

localStorage.setItem(
    "history",
    JSON.stringify(history)
);

renderHistory();

totalMinutes += parseInt(durationSelect.value);

localStorage.setItem(
    "pomodoros",
    pomodoros
);

localStorage.setItem(
    "totalMinutes",
    totalMinutes
);

document.getElementById("pomodorosCount")
.textContent = pomodoros;

document.getElementById("minutesCount")
.textContent = totalMinutes;
        }

    },1000);
}

function pauseTimer() {
    clearInterval(interval);
    interval = null;
}

function resetTimer() {

    clearInterval(interval);
    interval = null;

    totalSeconds = parseInt(durationSelect.value) * 60;
    remainingSeconds = totalSeconds;

    message.innerHTML = "";

    updateDisplay();
}

updateDisplay();

</script>

</body>
</html>
